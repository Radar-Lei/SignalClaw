# SignalClaw: Transit skill evolution in DISPATCHER CONTEXT with GLM-5
# The transit skill is evolved while other skills (normal/emergency/incident) stay fixed.
# Evaluation runs within the full event dispatcher pipeline.

[llm]
# GLM-5 via .env (OPENAI_BASE_URL, OPENAI_API_KEY, OPENAI_MODEL)
timeout_seconds = 300.0
max_retries = 5
temperature = 0.7

[evolution]
pop_size = 6
generations = 10
stagnation_threshold = 5
elite_count = 1
dispatcher_context = true
target_event_type = "transit"

[evaluator]
sumo_home = "/usr/share/sumo"
decision_step_interval = 1
weight_delay = 0.4
weight_queue = 0.4
weight_throughput = 0.2

[store]
store_dir = "store/glm5_evolve/transit_dispatcher"

scenario_dirs = [
    "scenarios/transit_b1",
    "scenarios/transit_b2",
]

# Fixed skills for dispatcher-context: normal uses MaxPressure-equivalent,
# emergency/incident use seed skills.
[fixed_skills.normal]
inlane_code = "value[0] += inlane_2_num_waiting_vehicle * 3 + inlane_2_num_vehicle"
outlane_code = "value[0] -= outlane_2_num_vehicle * 2"

[fixed_skills.emergency]
inlane_code = """
if event_emergency_count > 0:
    value[0] += max(0, 200 - event_emergency_distance) * 10
else:
    value[0] += inlane_2_num_waiting_vehicle * 3"""
outlane_code = "value[0] -= outlane_2_num_vehicle * 0.3"

[fixed_skills.incident]
inlane_code = """
if event_incident_blocked > 0:
    value[0] += max(0, inlane_2_num_vehicle - inlane_2_num_waiting_vehicle) * 5
else:
    value[0] += inlane_2_num_waiting_vehicle * 3"""
outlane_code = "value[0] -= outlane_2_num_vehicle * 0.5"

[fixed_skills.congestion]
inlane_code = """
value[0] += inlane_2_num_waiting_vehicle ** 2
if event_congestion_level > 1:
    value[0] += inlane_2_num_waiting_vehicle * event_congestion_level * 2"""
outlane_code = "value[0] += outlane_2_vehicle_dist * 0.5"
